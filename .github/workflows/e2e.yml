# Browser × device E2E matrix for the js/ artifact (see playwright.config.ts).
# Runs on every PR/push; a release tag must be minted through `npm run release`,
# which runs this same suite locally first (git can't block a tag server-side).
name: e2e

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium firefox webkit
      - run: npm run typecheck
      - run: npx playwright test
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
