# Browser × device E2E matrix for the js/ artifact (see playwright.config.ts).
# Runs on every PR/push; a release tag must be minted through `npm run release`,
# which runs this same suite locally first (git can't block a tag server-side).
#
# Sharded ONE PLAYWRIGHT PROJECT PER RUNNER. Each job trains a full software-GL
# WebGL loop (CI runners have no GPU), so two projects sharing a 4-vCPU runner
# starve each other — that is what timed out firefox-desktop, webkit-iphone and
# chromium-android before. One project per box, `workers: 1`, and the wall clock
# drops to the slowest single project instead of the sum.
#
# Each shard installs only the browser it runs; `e2e` is the single required
# check, so branch protection needn't know the shard names.
name: e2e

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  issue_comment:
    types: [created]

jobs:
  typecheck:
    if: github.event_name != 'issue_comment'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck

  # Covers the mini_vla/ Python source of truth (js/ is the ported artifact,
  # already covered by typecheck+test above). No ruff config exists yet, so
  # this is pytest only — add a lint step if that changes.
  check-python:
    if: github.event_name != 'issue_comment'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: pip install -e ".[dev]"
      - run: pytest

  test:
    if: github.event_name != 'issue_comment'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false # one engine's failure shouldn't hide the others
      matrix:
        include:
          - project: chromium-desktop
            browser: chromium
          - project: firefox-desktop
            browser: firefox
          - project: webkit-desktop
            browser: webkit
          - project: webkit-iphone
            browser: webkit
          - project: chromium-android
            browser: chromium
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps ${{ matrix.browser }}
      - run: npx playwright test --project=${{ matrix.project }}
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report-${{ matrix.project }}
          path: playwright-report/
          retention-days: 14

  claude-review:
    # Author-association gate is defense-in-depth: anthropics/claude-code-action
    # itself defaults to only acting for write-access users, but without this
    # check here the job (checkout + pull-requests:write + id-token:write) would
    # still spin up for a comment from ANY commenter, write-access or not.
    if: >
      github.event_name == 'issue_comment' &&
      github.event.issue.pull_request &&
      contains(github.event.comment.body, '@claude') &&
      contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.comment.author_association)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}

  # Single stable status for branch protection: green only if every shard and
  # the typecheck passed. `if: always()` so it still runs (and fails) when a
  # shard fails rather than being skipped along with it.
  e2e:
    if: always() && github.event_name != 'issue_comment'
    needs: [typecheck, test, check-python]
    runs-on: ubuntu-latest
    steps:
      - name: Verify all shards passed
        run: |
          echo "typecheck:    ${{ needs.typecheck.result }}"
          echo "test:         ${{ needs.test.result }}"
          echo "check-python: ${{ needs.check-python.result }}"
          [ "${{ needs.typecheck.result }}" = "success" ] \
            && [ "${{ needs.test.result }}" = "success" ] \
            && [ "${{ needs.check-python.result }}" = "success" ]

  # A green v* tag IS a mini-vla release. Tell portfolio-site to bump its pin so
  # the live demo tracks this version near-instantly (vs. an hourly poll).
  #
  # Runs only on tag pushes, only after the full e2e suite is green (`needs: e2e`
  # + default success gate). It must use a PAT, not the default GITHUB_TOKEN:
  # GITHUB_TOKEN cannot reach another repo, and events it raises are barred from
  # triggering workflows there. secrets.PORTFOLIO_DISPATCH_TOKEN is a
  # fine-grained PAT scoped to lukasmueller-dev/portfolio-site with Contents:
  # write (enough to POST /dispatches; add Workflows: write only if the listener
  # ever edits .github/workflows). See the listener in portfolio-site.
  dispatch-portfolio:
    if: github.event_name == 'push' && github.ref_type == 'tag'
    needs: [e2e]
    runs-on: ubuntu-latest
    steps:
      - uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.PORTFOLIO_DISPATCH_TOKEN }}
          repository: lukasmueller-dev/portfolio-site
          event-type: mini-vla-release
          client-payload: '{"tag": "${{ github.ref_name }}"}'
