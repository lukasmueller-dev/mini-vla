# ── Environment ──────────────────────────────────────────────────────────────
env_id: "PickCube-v1"
control_mode: "pd_ee_delta_pose"   # 7-DoF end-effector delta pose
obs_mode: "rgb+state"
render_mode: "rgb_array"

# Camera / observation
# Confirmed via inspect_env.py: obs["sensor_data"]["base_camera"]["rgb"] (1,128,128,3)
camera_name: "base_camera"
image_size: [128, 128]             # H x W – matches env native resolution
image_channels: 3

# Confirmed via inspect_env.py: obs["state"] shape (1, 42)
# state_dim: 42  (set automatically at runtime from dataset)
# action_dim: 7  (set automatically at runtime from dataset)

# ── Dataset ──────────────────────────────────────────────────────────────────
demo_path: "~/.maniskill/demos/PickCube-v1/motionplanning/trajectory.rgb+state.pd_ee_delta_pose.physx_cpu.h5"
num_demos: 100                     # number of demo trajectories to load

# ── Model ────────────────────────────────────────────────────────────────────
# CNN encoder
cnn_channels: [32, 64, 64]        # out-channels per conv layer
cnn_kernel_sizes: [8, 4, 3]
cnn_strides: [4, 2, 1]
image_embed_dim: 256

# State encoder MLP
state_embed_dim: 64
state_hidden_dims: [128, 128]

# Action head MLP (input = image_embed_dim + state_embed_dim)
action_hidden_dims: [256, 256]

# ── Training ─────────────────────────────────────────────────────────────────
seed: 42
num_epochs: 500
batch_size: 256
learning_rate: 3.0e-4
weight_decay: 1.0e-5
lr_scheduler: "cosine"            # "cosine" | "step" | null
warmup_epochs: 5
grad_clip: 1.0

train_val_split: 0.9              # fraction used for training
num_workers: 4

checkpoint_dir: "checkpoints"
checkpoint_every: 10              # save every N epochs
log_every: 50                     # log every N gradient steps

# ── Evaluation ───────────────────────────────────────────────────────────────
eval_checkpoint: null             # path to checkpoint; null = latest
eval_episodes: 50
eval_max_steps: 200
save_video: true
video_dir: "videos"
video_fps: 20
video_width: 512
video_height: 512
video_shader: "default"           # "default" | "rt-fast" | "rt" (rt needs GPU)

# ── WandB ────────────────────────────────────────────────────────────────────
use_wandb: true
wandb_project: "mini-vla"
wandb_entity: null                # set to your wandb username/team or leave null
run_name: "pickcube-rgb-state-bc"
